experiment:
  name: concat_clinical_embedding
  task: multimodal_survival
  model_type: embedding_multimodal
  output_dir: outputs/concat_clinical_embedding

data:
  label_name: full
  clinical_source: embedding
  clinical_embedding_name: bert6
  pathology_feature_name: uni

cv:
  n_splits: 5
  val_size: 0.20
  seed: 42

model:
  fusion:
    name: concat
  rna:
    extractor: variance_filter
    top_k: 2000
    use_cv: true
    hidden_dims: [512, 256]
    out_dim: 256
    dropout: 0.25
    activation: selu
    input_norm: true
  clinical:
    hidden_dims: [256, 128]
    emb_dim: 128
    token_hidden_dim: 256
    token_out_dim: 128
    dropout: 0.20
    activation: selu
  pathology:
    aggregator: gated
    attn_dim: 128
    emb_dim: 256
    dropout: 0.20
    tile_cap: 4096
  head:
    hidden_dims: [256, 64]
    dropout: 0.30
    activation: selu

training:
  epochs: 300
  patience: 40
  batch_size: 64
  min_events_per_batch: 3
  training_style: rna_clinical_batch
  lr: 0.0002
  weight_decay: 0.00001
  grad_clip: 5.0
  device: cuda
